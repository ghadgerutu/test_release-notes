name-template: 'v$NEXT_PATCH_VERSION'
tag-template: 'v$NEXT_PATCH_VERSION'

template: |
  ## What's Changed
  $CHANGES

categories:
  - title: '🚀 Features'
    labels: ['feat']
  - title: '🐛 Bug Fixes'
    labels: ['fix']
  - title: '⚡ Enhancements'
    labels: ['refactor', 'perf']
  - title: '📄 Documentation'
    labels: ['docs']

change-template: '- $TITLE (#$NUMBER)'
no-changes-template: '* No changes'
version-template: '$MAJOR.$MINOR.$PATCH$PRERELEASE'
version-resolver:
  major:
    labels: []
  minor:
    labels: []
  patch:
    labels: []
  default: 'patch'
