name-template: 'v$NEXT_PATCH_VERSION'
tag-template: 'v$NEXT_PATCH_VERSION'
categories:
  - title: 🚀 Features
    labels:
      - feat
  - title: 🐛 Bug Fixes
    labels:
      - fix
  - title: ⚡ Enhancements
    labels:
      - refactor
      - perf
  - title: 📄 Documentation
    labels:
      - docs
change-template: '- $TITLE (#$NUMBER)'
