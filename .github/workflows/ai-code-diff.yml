name: AI Code Diff Summary

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  analyze-diff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Full git history needed for diff

      - name: Show Pull Request Info (debug)
        run: |
          echo "PR Base branch (parent): ${{ github.event.pull_request.base.ref }}"
          echo "PR Head branch (child): ${{ github.event.pull_request.head.ref }}"
          echo "PR Number: ${{ github.event.number }}"
          echo "Repository: ${{ github.repository }}"

      - name: Fetch parent branch for diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}

      - name: Show changed files in diff (debug)
        run: |
          echo "Files changed in this PR diff:"
          git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD

      - name: Generate Git Diff
        run: |
          echo "Generating git diff between origin/${{ github.event.pull_request.base.ref }} and HEAD"
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > diff.txt
          head -n 100 diff.txt > diff_limited.txt
          echo "Diff files created."

      - name: Show Full Diff (for debugging)
        run: |
          echo "----- Full diff.txt contents -----"
          cat diff.txt
          echo "---------------------------------"

      - name: Show Limited Diff (first 100 lines)
        run: |
          echo "----- Limited diff_limited.txt contents -----"
          cat diff_limited.txt
          echo "---------------------------------------------"

      - name: AI Summary using OpenAI API
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Use actual newlines in prompt (not literal \n)
          prompt="Summarize this code diff in simple English:

          $(cat diff_limited.txt)"

          echo "Prompt sent to OpenAI API:"
          echo "$prompt"

          # Call OpenAI API and save full raw response to raw_response.json (debug)
          curl_response=$(curl https://api.openai.com/v1/chat/completions \
            -s \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d '{
              "model": "gpt-4",
              "messages": [{"role": "user", "content": "'"${prompt//\"/\\\"}"'"}],
              "temperature": 0.3
            }')

          echo "Raw API response:"
          echo "$curl_response" > raw_response.json

          # Extract the summary text from the JSON response
          response=$(echo "$curl_response" | jq -r '.choices[0].message.content')

          echo "Response received from OpenAI API:"
          echo "$response"

          # Save summary to file for artifact upload
          echo "$response" > ai_summary.txt

      - name: Upload Summary as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Code-Diff-Summary
          path: |
            - ai_summary.txt
            - raw_response.json
